<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PAYMENT · Verificación de Retiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  :root{
    --bg:#0b1420; --card:#101e2e; --card2:#162a3d; --border:#22394f;
    --text:#e8eef2; --muted:#8aa0b3; --accent:#19b6a0;
    --green:#1fa463; --green-bg:#103324; --red:#e0445b; --red-bg:#3a1620;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh;}
  .wrap{max-width:480px; margin:0 auto; padding:20px;}

  @media (min-width: 700px){
    .wrap{max-width:600px; padding:32px;}
    h1{font-size:24px;}
    .sub{font-size:15px;}
    .card{padding:26px;}
    input{padding:14px; font-size:17px;}
    button{padding:14px 18px; font-size:16px;}
    .statusBig{font-size:28px; padding:30px;}
    .detailRow{font-size:15px; padding:10px 0;}
    video{max-height:420px; object-fit:cover;}
  }

  @media (min-width: 1024px){
    .wrap{max-width:680px;}
  }
  h1{font-size:18px; margin:0 0 4px; text-align:center;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:18px; text-align:center;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:14px; text-align:center;}
  input{width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:16px; text-align:center;}
  button{margin-top:12px; padding:12px 16px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-weight:700; font-size:15px; cursor:pointer; width:100%;}
  button.secondary{background:var(--card2); border:1px solid var(--border); color:var(--text);}
  video{width:100%; border-radius:10px; margin-top:10px;}
  #camWrap{display:none;position:relative;}
  #scanGuide{
    position:absolute; top:15%; left:15%; width:70%; height:70%;
    border:3px solid var(--accent); border-radius:16px; pointer-events:none;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.35);
  }
  .statusBig{padding:26px; border-radius:14px; margin:16px 0; font-size:24px; font-weight:800;}
  .statusBig.auth{background:var(--green-bg); color:var(--green); border:2px solid var(--green);}
  .statusBig.noauth{background:var(--red-bg); color:var(--red); border:2px solid var(--red);}
  .detailRow{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; text-align:left;}
  .detailRow span:first-child{color:var(--muted);}
  #qrResult{display:none;}
/* ============ PERSONAJE Y PANEL DE RESULTADO ============ */
.resultStage{ position:relative; min-height:230px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:6px; }

.spinnerWrap{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:30px 0; }
.spinnerRing{ width:36px; height:36px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin 0.8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.monsterStage{ position:relative; width:140px; height:150px; }
.monster{ position:absolute; bottom:0; left:50%; width:110px; height:120px; margin-left:-55px;
  animation: monsterIn 0.55s cubic-bezier(.34,1.56,.64,1) both, breathe 3.6s ease-in-out 0.6s infinite; transform-origin:bottom center; }
@keyframes monsterIn{ 0%{ transform:translateY(40px) scale(.4) rotate(-8deg); opacity:0; } 60%{ transform:translateY(-6px) scale(1.06) rotate(2deg); opacity:1; } 100%{ transform:translateY(0) scale(1) rotate(0); } }
@keyframes breathe{ 0%,100%{ transform:scale(1,1); } 50%{ transform:scale(1.03,0.97); } }

.mBody{ position:absolute; left:10px; top:25px; width:90px; height:80px; border-radius:46% 46% 50% 50%/55% 55% 45% 45%;
  background:linear-gradient(155deg,#22c4ac,#0e8c7c); box-shadow:0 10px 18px rgba(0,0,0,0.35); transition:background 0.4s; }
.monster.bad .mBody{ background:linear-gradient(155deg,#e2554a,#a82f26); }

.mHead{ position:relative; width:100%; height:100%; animation: headTilt 4.5s ease-in-out 1s infinite; transform-origin:bottom center; }
@keyframes headTilt{ 0%,100%{ transform:rotate(0deg); } 25%{ transform:rotate(-3deg); } 75%{ transform:rotate(3deg); } }

.mEar{ position:absolute; width:14px; height:20px; background:inherit; }
.mHorn{ position:absolute; top:-10px; width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:16px solid #0e8c7c; }
.mHorn.l{ left:14px; transform:rotate(-12deg); } .mHorn.r{ right:14px; transform:rotate(12deg); }
.monster.bad .mHorn{ border-bottom-color:#7a1f19; }

.mEyes{ position:absolute; top:28px; left:0; width:100%; display:flex; justify-content:center; gap:14px; }
.mEye{ width:22px; height:22px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);
  animation: blink 4.2s ease-in-out 1.4s infinite; }
.mPupil{ width:10px; height:10px; background:#0b1420; border-radius:50%; animation: lookAround 5.5s ease-in-out 0.8s infinite; }
@keyframes blink{ 0%,92%,100%{ transform:scaleY(1); } 95%{ transform:scaleY(0.12); } }
@keyframes lookAround{ 0%,100%{ transform:translate(0,0); } 20%{ transform:translate(2px,-1px); } 50%{ transform:translate(-2px,1px); } 80%{ transform:translate(1px,1px); } }

.monster.bad .mEye{ border-radius:30% 30% 50% 50%; transform:rotate(0deg); }
.monster.bad .mPupil{ animation:none; }

.mBrow{ position:absolute; top:18px; width:18px; height:4px; background:#0b1420; border-radius:2px; opacity:0; transition:opacity .3s; }
.monster.bad .mBrow{ opacity:0.85; }
.mBrow.l{ left:22px; transform:rotate(18deg); } .mBrow.r{ right:22px; transform:rotate(-18deg); }

.mMouth{ position:absolute; bottom:18px; left:50%; width:30px; height:14px; margin-left:-15px; border-radius:0 0 14px 14px; background:#0b1420; }
.monster.good .mMouth{ border-radius:0 0 16px 16px; clip-path: ellipse(50% 60% at 50% 0%); }
.monster.bad .mMouth{ height:5px; border-radius:3px; transform:rotate(-3deg); }

.mArm{ position:absolute; width:14px; height:34px; border-radius:10px; background:#0e8c7c; top:48px; transition: all .35s ease; }
.monster.bad .mArm{ background:#a82f26; }
.mArm.l{ left:-6px; transform:rotate(18deg); transform-origin:top center; }
.mArm.r{ right:-6px; transform:rotate(-18deg); transform-origin:top center; }
.monster.good .mArm.r{ animation: thumbsUp 2.6s ease-in-out 1.2s infinite; }
.monster.good .mArm.l{ animation: armSway 3.2s ease-in-out infinite; }
@keyframes thumbsUp{ 0%,60%,100%{ transform:rotate(-18deg); } 75%{ transform:rotate(-95deg); } 88%{ transform:rotate(-85deg); } }
@keyframes armSway{ 0%,100%{ transform:rotate(18deg); } 50%{ transform:rotate(10deg); } }
.monster.bad .mArm.l{ transform:rotate(70deg) translate(8px,2px); }
.monster.bad .mArm.r{ transform:rotate(-70deg) translate(-8px,2px); }

.mLeg{ position:absolute; width:14px; height:22px; border-radius:8px; background:#0b6d60; bottom:-14px; }
.monster.bad .mLeg{ background:#7a1f19; }
.mLeg.l{ left:20px; } .mLeg.r{ right:20px; animation: footTap 1.8s ease-in-out infinite; transform-origin:top center; }
@keyframes footTap{ 0%,100%{ transform:rotate(0deg); } 50%{ transform:rotate(10deg); } }
.monster.bad .mLeg.r{ animation:none; }

.mFoot{ position:absolute; bottom:-7px; width:20px; height:10px; border-radius:50%; background:#0b6d60; }
.mFoot.l{ left:-3px; } .mFoot.r{ right:-3px; }
.monster.bad .mFoot{ background:#7a1f19; }

.mHand{ position:absolute; bottom:-5px; width:13px; height:13px; border-radius:50%; }
.mArm.l .mHand{ left:-1px; background:#0b6d60; } .mArm.r .mHand{ right:-1px; background:#0b6d60; }
.monster.bad .mHand{ background:#7a1f19; }

.mTail{ position:absolute; right:-10px; bottom:6px; width:22px; height:10px; border-radius:0 50% 50% 0; background:#0e8c7c;
  transform-origin:left center; animation: tailWag 2.4s ease-in-out infinite; }
.monster.bad .mTail{ background:#7a1f19; animation:none; transform:rotate(8deg); }
@keyframes tailWag{ 0%,100%{ transform:rotate(-12deg); } 50%{ transform:rotate(12deg); } }

.mBelly{ position:absolute; left:50%; bottom:8px; width:42px; height:34px; margin-left:-21px; border-radius:50%;
  background:rgba(255,255,255,0.18); }
.mSpot{ position:absolute; width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.16); }
.mSpot.s1{ top:8px; left:14px; } .mSpot.s2{ top:30px; left:60px; } .mSpot.s3{ top:50px; left:24px; width:5px; height:5px; }

.mCheek{ position:absolute; top:42px; width:10px; height:7px; border-radius:50%; background:rgba(255,120,120,0.55); opacity:0; transition:opacity .3s; filter:blur(0.3px); }
.monster.good .mCheek{ opacity:0.9; }
.mCheek.l{ left:14px; } .mCheek.r{ right:14px; }

.mTooth{ position:absolute; top:-1px; width:5px; height:6px; background:#fff; border-radius:0 0 2px 2px; opacity:0; }
.monster.bad .mTooth{ opacity:1; }
.mTooth.l{ left:7px; } .mTooth.r{ right:7px; }

.statusCard{ position:relative; width:100%; max-width:300px; border-radius:18px; padding:18px 16px; margin-top:-6px;
  background:rgba(22,42,61,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.08); overflow:hidden;
  animation: cardPop 0.5s cubic-bezier(.2,1.4,.4,1) 0.25s both; transition: transform .15s ease; }
@keyframes cardPop{ 0%{ transform:scale(.85) translateY(10px); opacity:0; } 100%{ transform:scale(1) translateY(0); opacity:1; } }
.statusCard::before{ content:''; position:absolute; inset:-2px; border-radius:20px; z-index:-1;
  background: conic-gradient(from 0deg, transparent, currentColor, transparent 35%);
  animation: borderSweep 2.6s linear infinite; opacity:0.55; }
.statusCard.good{ color: var(--green); box-shadow:0 0 26px rgba(31,164,99,0.35); }
.statusCard.bad{ color: var(--red); box-shadow:0 0 26px rgba(224,68,91,0.35); }
@keyframes borderSweep{ to{ transform:rotate(360deg); } }
.statusCard:active{ transform:scale(0.97); }

.statusTitle{ font-size:19px; font-weight:800; color:var(--text); position:relative; z-index:1; }
.statusPhrase{ font-size:13px; color:var(--muted); margin-top:6px; font-style:italic; position:relative; z-index:1;
  animation: fadeUp 0.5s ease 0.55s both; }
@keyframes fadeUp{ 0%{ opacity:0; transform:translateY(6px); } 100%{ opacity:1; transform:translateY(0); } }

.monster.bad.shake{ animation: monsterIn 0.55s cubic-bezier(.34,1.56,.64,1) both, breathe 3.6s ease-in-out infinite, headShake 0.45s ease; }
@keyframes headShake{ 0%,100%{ transform:rotate(0); } 25%{ transform:rotate(-9deg); } 75%{ transform:rotate(9deg); } }

@media (prefers-reduced-motion: reduce){
  .monster, .mHead, .mEye, .mPupil, .mArm, .mLeg, .statusCard, .statusCard::before{ animation:none !important; }
}
@media (min-width: 700px){
  .monsterStage{ width:170px; height:180px; }
  .monster{ width:130px; height:140px; margin-left:-65px; transform-scale:1.1; }
}
.monsterShadow{ position:absolute; bottom:-4px; left:50%; width:70px; height:14px; margin-left:-35px; border-radius:50%;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.4), transparent 70%);
  animation: shadowPulse 3.6s ease-in-out 0.6s infinite; }
@keyframes shadowPulse{ 0%,100%{ transform:scale(1); opacity:0.5; } 50%{ transform:scale(0.85); opacity:0.3; } }

.particleField{ position:absolute; inset:0; pointer-events:none; overflow:visible; }
.particle{ position:absolute; border-radius:50%; opacity:0; }
.monster.good ~ .particleField .particle{ background:var(--accent); animation: confetti 1.1s ease-out forwards; }
.monster.bad ~ .particleField .particle{ background:#6b6b6b; border-radius:40%; animation: dustPuff 0.9s ease-out forwards; }
@keyframes confetti{
  0%{ opacity:0; transform:translate(0,0) scale(0.4) rotate(0deg); }
  15%{ opacity:1; }
  100%{ opacity:0; transform: translate(var(--dx), var(--dy)) scale(1) rotate(var(--rot)); }
}
@keyframes dustPuff{
  0%{ opacity:0; transform:translate(0,0) scale(0.3); }
  20%{ opacity:0.6; }
  100%{ opacity:0; transform:translate(var(--dx), var(--dy)) scale(1.4); }
}

.detailsCard{ width:100%; max-width:300px; margin:14px auto 0; border-radius:14px; padding:4px 14px;
  background:rgba(255,255,255,0.03); border:1px solid var(--border); }
.detailsCard .detailRow:last-child{ border-bottom:none; }
.detailRow{ display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; text-align:left; }
.detailRow span:first-child{ color:var(--muted); display:flex; align-items:center; gap:6px; }
.detailRow span:last-child{ font-weight:600; text-align:right; }

.refreshNote{ display:flex; align-items:center; justify-content:center; gap:6px; font-size:11px; color:var(--muted); margin:10px 0; }
.refreshDot{ width:6px; height:6px; border-radius:50%; background:var(--accent); animation: dotPulse 1.6s ease-in-out infinite; }
@keyframes dotPulse{ 0%,100%{ opacity:0.3; transform:scale(0.8); } 50%{ opacity:1; transform:scale(1.15); } }

/* ============ FIN PERSONAJE ============ */
</style>
</head>
<body>
<div class="wrap" id="loginScreen">
  <div class="card" style="max-width:340px;margin:60px auto;text-align:center;">
    <img src="" id="loginLogo" style="max-width:140px;margin-bottom:10px;">
    <h1 style="font-size:16px;">Acceso restringido</h1>
    <div class="sub">Recepción</div>
    <input id="pinInput" type="password" placeholder="Código de acceso" onkeydown="if(event.key==='Enter')checkPin()">
    <button onclick="checkPin()">Ingresar</button>
    <div id="pinError" style="color:#e0445b;font-size:12px;margin-top:8px;display:none;">Código incorrecto</div>
  </div>
</div>

<div class="wrap" id="appScreen" style="display:none;">
  <h1>🛂 Verificación de Retiro</h1>
  <div class="sub">Escaneá el QR o ingresá el ID de la credencial</div>

  <div class="card">
    <input id="searchId" placeholder="ID de credencial o nombre y apellido">
    <button onclick="verificar()">Buscar / Verificar</button>
    <button class="secondary" onclick="toggleCam()">📷 Escanear QR con cámara</button>
    <button class="secondary" onclick="verHistorialEscaneos()">📋 Ver historial de escaneos</button>
    <div id="camWrap">
      <video id="video" playsinline></video>
      <div id="scanGuide"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;">📏 Alejá el QR 15-25cm de la cámara para que enfoque bien</div>
      <canvas id="canvas" style="display:none;"></canvas>
      <button class="secondary" onclick="toggleCam()">Cerrar cámara</button>
    </div>
  </div>

  <div class="card" id="qrResult"></div>
</div>

function fromDbRow(r){

async function registrarEscaneo(credencialId, responsable, resultado){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/escaneos_log`, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify([{ credencial_id: credencialId, responsable: responsable || '-', resultado }])
    });
  }catch(e){
    console.error('Error registrando escaneo:', e);
  }

async function verHistorialEscaneos(){
  const box = document.getElementById('qrResult');
  box.style.display = 'block';
  box.innerHTML = '<div class="empty">Cargando historial...</div>';
  if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  try{

    box.innerHTML = '<div class="empty">No se pudo cargar el historial.</div>';

}

function startPolling(id){
  const timer = setInterval(()=>renderResultado(id, true), 6000);

    if(pollTimer === timer){

}

function lanzarParticulas(mood){
  const field = document.getElementById('particleField');
  if(!field) return;
  const n = 10;
  for(let i=0;i<n;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI*2*i/n) + (Math.random()*0.5);
    const dist = 50 + Math.random()*40;
    p.style.setProperty('--dx', (Math.cos(angle)*dist)+'px');
    p.style.setProperty('--dy', (Math.sin(angle)*dist - 30)+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    const size = mood === 'good' ? (4+Math.random()*4) : (3+Math.random()*3);
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.left = '50%'; p.style.top = '55%';
    p.style.animationDelay = (Math.random()*0.15)+'s';
    field.appendChild(p);
  }
  setTimeout(()=>{ field.innerHTML = ''; }, 1400);
}

function setupCardInteraction(){
  const card = document.getElementById('statusCardEl');
  const monster = document.getElementById('monsterEl');
  if(!card || !monster || !card.classList.contains('bad')) return;
  card.addEventListener('click', () => {
    monster.classList.remove('shake');
    void monster.offsetWidth; // reiniciar animación
    monster.classList.add('shake');
    card.style.transform = 'translateX(-4px)';
    setTimeout(()=>{ card.style.transform = ''; }, 150);
  });
}

function estaVencida(vencimientoStr){
  if(!vencimientoStr) return false;
  const [d,m,y] = vencimientoStr.split('/').map(Number);
  const venc = new Date(y, m-1, d, 23, 59, 59);
  return new Date() > venc;
}

async function registrarRetiro(id){
  const nombre = (document.getElementById('guardNombre')?.value || '').trim();
  if(!nombre){
    alert('Ingresá tu nombre para registrar el retiro.');
    return;
  }
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/credenciales?id=eq.${encodeURIComponent(id)}&select=historial`, { headers: SB_HEADERS });
    const rows = await res.json();
    if(!rows.length) return;
    const historial = rows[0].historial || [];
    historial.push({ accion: 'Retiro físico', usuario: nombre, fecha: new Date().toLocaleString('es-PY'), estado: 'auth' });
    await fetch(`${SUPABASE_URL}/rest/v1/credenciales?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify({ historial })
    });
    alert('✅ Retiro registrado correctamente.');
  }catch(e){
    alert('⚠️ No se pudo registrar el retiro: ' + e.message);
  }
}

async function buscarPorNombre(nombre){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/credenciales?responsable=ilike.*${encodeURIComponent(nombre)}*&select=*&order=created_at.desc`, { headers: SB_HEADERS });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    return rows.map(fromDbRow);
  }catch(e){
    console.error('Error buscando por nombre:', e);
    return [];
  }
}

function checkUrlParam(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(id){
    document.getElementById('searchId').value = id;
    verificar();
  }
}

async function getCred(id){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/credenciales?id=eq.${encodeURIComponent(id)}&select=*`, { headers: SB_HEADERS });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    return rows.length ? fromDbRow(rows[0]) : null;
  }catch(e){
    console.error('Error obteniendo credencial:', e);
    return null;
  }
}

let pollTimer = null;
let currentId = null;

async function verificar(){
  const query = document.getElementById('searchId').value.trim();
  if(!query) return;
  if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }

  // Si parece un ID de credencial (formato RET-YYYY-NNNN), buscar directo
  if(/^RET-\d{4}-\d+$/i.test(query)){
    currentId = query;
    await renderResultado(query);
    pollTimer = startPolling(currentId);
    return;
  }

  // Si no, tratarlo como búsqueda por nombre
  const box = document.getElementById('qrResult');
  box.style.display = 'block';
  const resultados = await buscarPorNombre(query);
  if(resultados.length === 0){
    box.innerHTML = `<div class="statusBig noauth">❌ NO SE ENCONTRARON COINCIDENCIAS</div>`;
  } else if(resultados.length === 1){
    currentId = resultados[0].id;
    await renderResultado(currentId);
    pollTimer = startPolling(currentId);
  } else {
    box.innerHTML = '<b>Varios resultados, elegí uno:</b><br><br>' + resultados.map(d => `
      <div onclick="seleccionarResultado('${d.id}')" style="text-align:left;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--card2);">
        <b>${d.responsable||'-'}</b><br>
        <span style="color:var(--muted);font-size:12px;">${d.id} · ${d.equipo||''} ${d.modelo||''}</span>
      </div>
    `).join('');
  }
}

async function seleccionarResultado(id){
  currentId = id;
  document.getElementById('searchId').value = id;
  await renderResultado(id);
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = startPolling(currentId);
}

async function renderResultado(id, isAuto){
  const box = document.getElementById('qrResult');
  box.style.display = 'block';

  // Las búsquedas manuales siempre son "fresh" — no comparan contra resultados de otra credencial
  if(!isAuto){ delete box.dataset.lastAuth; }

  // Mientras consulta, mostrar spinner solo si NO es un refresco automático silencioso
  if(!isAuto){
    box.innerHTML = `<div class="spinnerWrap"><div class="spinnerRing"></div><div style="font-size:12px;color:var(--muted);">Verificando...</div></div>`;
  }

  const d = await getCred(id);

  if(!d){
    box.innerHTML = `<div class="statusBig noauth">❌ CREDENCIAL NO ENCONTRADA</div><button onclick="escanearOtro()">🔄 Escanear otro</button>`;
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    if(!isAuto) registrarEscaneo(id, '-', 'no_encontrada');
    return;
  }

  const vencida = estaVencida(d.vencimiento);
  const isAuth = d.estado === 'auth' && !vencida;
  const prevAuth = box.dataset.lastAuth;
  const yaRenderizado = prevAuth !== undefined;
  const changed = yaRenderizado && prevAuth !== String(isAuth);

  // Si es un refresco automático y el estado NO cambió, no reconstruir nada:
  // el personaje sigue "vivo" con sus animaciones en curso, sin parpadeos.
  if(isAuto && yaRenderizado && !changed){
    return;
  }

  box.dataset.lastAuth = String(isAuth);
  if(!isAuto){
    registrarEscaneo(d.id, d.responsable, vencida ? 'vencida' : d.estado);
  }

  const mood = isAuth ? 'good' : 'bad';
  const frase = isAuth ? fraseAleatoria(FRASES_BUENO) : fraseAleatoria(FRASES_MALO);
  const tituloEstado = vencida ? '⛔ CREDENCIAL VENCIDA' : (isAuth ? '✅ AUTORIZADO PARA RETIRO' : '⛔ NO AUTORIZADO');

  box.innerHTML = `
    <div class="resultStage">
      ${changed ? '<div style="color:#f5a623;font-size:12px;font-weight:700;margin-bottom:6px;">⚠️ EL ESTADO CAMBIÓ</div>' : ''}
      ${d.foto ? `<img src="${d.foto}" style="width:60px;height:60px;object-fit:cover;border-radius:50%;margin-bottom:6px;border:2px solid var(--border);">` : ''}
      ${buildMonster(mood)}
      <div class="statusCard ${mood}" id="statusCardEl">
        <div class="statusTitle">${tituloEstado}</div>
        <div class="statusPhrase">${frase}</div>
      </div>
    </div>
    <div class="detailsCard">
      <div class="detailRow"><span>🆔 ID</span><span>${d.id}</span></div>
      <div class="detailRow"><span>🖥️ Equipo</span><span>${d.equipo||'-'} ${d.marca||''} ${d.modelo||''}</span></div>
      <div class="detailRow"><span>🔢 Serie</span><span>${d.serie||'-'}</span></div>
      <div class="detailRow"><span>👤 Responsable</span><span>${d.responsable||'-'}</span></div>
      <div class="detailRow"><span>📅 Emitida</span><span>${d.fecha}</span></div>
      <div class="detailRow"><span>⏳ Vencimiento</span><span>${d.vencimiento || 'Sin vencimiento'}</span></div>
    </div>
    <div class="refreshNote"><span class="refreshDot"></span> Actualizando automáticamente</div>
    ${isAuth ? `
      <input id="guardNombre" placeholder="Tu nombre (para el registro)" style="margin-top:6px;">
      <button onclick="registrarRetiro('${d.id}')">📦 Registrar retiro físico</button>
    ` : ''}
    <button class="secondary" onclick="escanearOtro()">🔄 Escanear otro</button>
  `;
  setupCardInteraction();
  setTimeout(()=>lanzarParticulas(mood), 550);
}

let barcodeDetector = null;
if('BarcodeDetector' in window){
  try{ barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] }); }catch(e){ barcodeDetector = null; }
}

async function toggleCam(){
  const wrap = document.getElementById('camWrap');
  const video = document.getElementById('video');
  if(wrap.style.display === 'block'){
    wrap.style.display = 'none';
    scanning = false;
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
    return;
  }
  try{
    const constraints = {
      video: {
        facingMode: 'environment',
        focusMode: 'continuous',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };
    try{
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    }catch(e){
      // Reintentar sin focusMode si el navegador lo rechaza como restricción no soportada
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    }
    video.srcObject = stream;
    video.play();
    wrap.style.display = 'block';
    scanning = true;
    scanLoop();
  }catch(e){
    alert('No se pudo acceder a la cámara: ' + e.message);
  }
}

async function scanLoop(){
  if(!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  if(video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0){
    // Recortar al cuadro central (zona donde el usuario alinea el QR) para mejorar la detección
    const side = Math.min(video.videoWidth, video.videoHeight) * 0.7;
    const sx = (video.videoWidth - side) / 2;
    const sy = (video.videoHeight - side) / 2;
    canvas.width = side;
    canvas.height = side;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, sx, sy, side, side, 0, 0, side, side);

    let detectedValue = null;

    if(barcodeDetector){
      try{
        const codes = await barcodeDetector.detect(canvas);
        if(codes && codes.length){ detectedValue = codes[0].rawValue; }
      }catch(e){ /* seguir con jsQR como respaldo */ }
    }

    if(!detectedValue){
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if(code){ detectedValue = code.data; }
    }

    if(detectedValue){
      manejarValorEscaneado(detectedValue);
      return;
    }
  }
  requestAnimationFrame(scanLoop);
}

function manejarValorEscaneado(valor){
  // Si el QR contiene una URL completa (https://...?id=XXX), extraer solo el ID
  let idFinal = valor;
  try{
    if(valor.startsWith('http')){
      const url = new URL(valor);
      const idParam = url.searchParams.get('id');
      if(idParam) idFinal = idParam;
    }
  }catch(e){ /* no era una URL válida, usar el valor tal cual */ }
  document.getElementById('searchId').value = idFinal;
  toggleCam();
  verificar();
}
</script>
